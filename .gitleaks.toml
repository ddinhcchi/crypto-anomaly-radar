# gitleaks v8 custom config — extends the default ruleset with project-specific
# allowlists so documentation placeholders don't trigger false positives.
#
# Test locally:   gitleaks detect --source . --config .gitleaks.toml --verbose

[extend]
useDefault = true

[[allowlists]]
description = "Documentation placeholders are not secrets"
paths = [
    '''\.env\.example$''',
    '''README\.md$''',
]

[[allowlists]]
description = "Binance public REST endpoint requires no auth — host strings are not secrets"
regexes = [
    '''api\.binance\.com''',
]
